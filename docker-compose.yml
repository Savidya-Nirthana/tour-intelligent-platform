# docker-compose.yml
version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    # environment:
    #   - QDRANT__SERVICE__API_KEY= # optional auth for local

  # app:
  #   build: .
  #   container_name: ceysaid
  #   restart: always
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     - qdrant

volumes:
  qdrant_storage:
    driver: local
